
<!DOCTYPE html>
<html>
<head>
  <title>Realtime Database Test</title>
</head>
<body>

<h2>Enter Email</h2>

<input id="email" placeholder="Email">
<input id="pasword" placeholder="Pasword">

<button onclick="saveData()">Submit</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://vuva-b4e3e-default-rtdb.firebaseio.com",
  projectId: "vuva-b4e3e",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = function () {

  const email = document.getElementById("email").value;
  const pasword = document.getElementById("pasword").value;

  const newRef = push(ref(db, "users"));

  set(newRef, {
    email: email,
    pasword: pasword
  });

  document.getElementById("msg").innerText = "Saved ✔";

}
</script>

</body>
</html>
